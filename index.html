<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My FSD Stats</title>
<style>
  :root{
    --bg: #ffffff;
    --panel: #f7f8fa;
    --line: #e8eaed;
    --text: #1c1e21;
    --dim: #8a8f98;
    --accent: #3d7bfb;
    --track: #e5e8ee;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height:100vh;
  }
  .wrap{ max-width:480px; margin:0 auto; padding:32px 12px 48px; }

  header{ margin-bottom:8px; text-align:center; }
  .eyebrow{
    font-size:12px; letter-spacing:.1em; color:var(--dim);
    text-transform:uppercase; margin:0;
  }

  .gauge-wrap{
    position:relative; width:100%; max-width:320px; margin:24px auto 8px;
    display:flex; align-items:center; justify-content:center;
  }
  .gauge-center{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-52%);
    text-align:center;
  }
  .gauge-pct{
    font-size:56px; font-weight:600; color:var(--text); line-height:1;
  }
  .gauge-label{
    font-size:13px; color:var(--dim); margin-top:6px;
  }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:28px; }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px 10px; text-align:center;
  }
  .card .label{ font-size:11px; color:var(--dim); letter-spacing:.06em; text-transform:uppercase; }
  .card .value{
    font-size:clamp(16px, 5.5vw, 20px); margin-top:6px; font-weight:600;
    white-space:nowrap;
  }
  .card .unit{ font-size:12px; color:var(--dim); margin-left:2px; font-weight:400; }

  .updated{
    text-align:center; font-size:12px; color:var(--dim); margin-top:22px;
  }

  .empty{
    text-align:center; color:var(--dim); font-size:14px; padding:60px 20px;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="eyebrow">Nakra M3 FSD Stats</p>
    </header>

    <div id="content">
      <div class="empty">Loading...</div>
    </div>
  </div>

  <script>
    function polarToCartesian(cx, cy, r, angleDeg) {
      const rad = (angleDeg * Math.PI) / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    function describeArc(cx, cy, r, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, r, startAngle);
      const end = polarToCartesian(cx, cy, r, endAngle);
      const largeArc = endAngle - startAngle <= 180 ? 0 : 1;
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} 1 ${end.x} ${end.y}`;
    }

    const GAUGE_START = 135; // bottom-left
    const GAUGE_SWEEP = 270; // degrees, ends bottom-right

    function animateGauge(targetPercent) {
      const path = document.getElementById('gauge-fill');
      const pctText = document.getElementById('gauge-pct-text');
      if (!path) return;

      const duration = 900;
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
        const current = eased * targetPercent;
        const endAngle = GAUGE_START + (GAUGE_SWEEP * current) / 100;
        path.setAttribute('d', describeArc(100, 100, 82, GAUGE_START, Math.max(endAngle, GAUGE_START + 0.01)));
        pctText.textContent = Math.round(current) + '%';
        if (t < 1) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    function buildGauge(percent) {
      const startPt = polarToCartesian(100, 100, 104, GAUGE_START);
      const endPt = polarToCartesian(100, 100, 104, GAUGE_START + GAUGE_SWEEP);
      return `
        <div class="gauge-wrap">
          <svg width="280" height="280" viewBox="0 0 200 200">
            <path d="${describeArc(100, 100, 82, GAUGE_START, GAUGE_START + GAUGE_SWEEP)}"
                  fill="none" stroke="var(--track)" stroke-width="14" stroke-linecap="round"/>
            <path id="gauge-fill" d="${describeArc(100, 100, 82, GAUGE_START, GAUGE_START)}"
                  fill="none" stroke="var(--accent)" stroke-width="14" stroke-linecap="round"/>
            <text x="${startPt.x}" y="${startPt.y}" text-anchor="middle" font-size="11"
                  fill="var(--dim)" font-family="-apple-system, sans-serif">0</text>
            <text x="${endPt.x}" y="${endPt.y}" text-anchor="middle" font-size="11"
                  fill="var(--dim)" font-family="-apple-system, sans-serif">100</text>
          </svg>
          <div class="gauge-center">
            <div class="gauge-pct" id="gauge-pct-text">0%</div>
            <div class="gauge-label">Miles Driven on FSD</div>
          </div>
        </div>
      `;
    }

    async function loadStats() {
      const content = document.getElementById('content');
      try {
        const res = await fetch('/api/tesla-stats');
        const stats = await res.json();

        if (!stats.percent && stats.percent !== 0) {
          content.innerHTML = '<div class="empty">No data received yet — check that Teslemetry streaming is running.</div>';
          return;
        }

        const updated = stats.updatedAt
          ? new Date(stats.updatedAt).toLocaleString()
          : 'unknown';

        content.innerHTML = `
          ${buildGauge(stats.percent)}
          <div class="grid">
            <div class="card">
              <div class="label">FSD Miles</div>
              <div class="value">${stats.selfDrivingMiles.toLocaleString(undefined, {maximumFractionDigits:1})}<span class="unit">mi</span></div>
            </div>
            <div class="card">
              <div class="label">Total Miles</div>
              <div class="value">${stats.milesSinceReset.toLocaleString(undefined, {maximumFractionDigits:1})}<span class="unit">mi</span></div>
            </div>
          </div>
          <p class="updated">Last updated: ${updated}</p>
        `;

        animateGauge(stats.percent);
      } catch (err) {
        content.innerHTML = '<div class="empty">Couldn\'t load stats right now.</div>';
      }
    }

    loadStats();
  </script>
</body>
</html>
